<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#f6c65b" />
    <link rel="canonical" href="https://sunnypubs.live/" />
    <meta http-equiv="refresh" content="0; url=https://sunnypubs.live/" />
    <title>Sunny Pubs has moved</title>
    <script>
      (() => {
        const targetOrigin = "https://sunnypubs.live";
        const path = window.location.pathname || "/";
        const target = new URL(path + window.location.search + window.location.hash, targetOrigin);
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Sunny Pubs has moved</h1>
      <p>Redirecting you to the shared Sunny Pubs app.</p>
      <p><a href="https://sunnypubs.live/">Continue to Sunny Pubs</a></p>
    </main>
  </body>
</html>
