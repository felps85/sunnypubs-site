<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#f6c65b" />
    <link rel="canonical" href="https://sunnypubs.live/ie/" />
    <meta http-equiv="refresh" content="0; url=https://sunnypubs.live/ie/" />
    <title>Sunny Pubs has moved</title>
    <script>
      (() => {
        const targetOrigin = "https://sunnypubs.live";
        const legacyMarket = "ie";
        const path = window.location.pathname || "/";
        const segments = path.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
        const firstSegment = segments[0];
        const hasMarketPrefix = firstSegment === "ie" || firstSegment === "uk";
        const targetPath = path === "/" ? `/${legacyMarket}/` : hasMarketPrefix ? path : `/${legacyMarket}${path.startsWith("/") ? path : `/${path}`}`;
        window.location.replace(`${targetOrigin}${targetPath}${window.location.search}${window.location.hash}`);
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Sunny Pubs has moved</h1>
      <p>The Ireland app now lives on the shared Sunny Pubs site.</p>
      <p><a href="https://sunnypubs.live/ie/">Continue to Sunny Pubs</a></p>
    </main>
  </body>
</html>
